<!DOCTYPE html>
<html>
<head>
  <title>JavaScript</title>
  <script>
    var a = ["Sanjay", "Aman", "Rehman", "Karan"];

    document.write(a + "<br><br>");
    a.shift();
    document.write(a);
  </script>
</head>
<body>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
  <title>JavaScript</title>
  <script>
    var a = ["Sanjay", "Aman", "Rehman"];

    a.unshift("Rahul");
    document.write(a + "<br><br>");
    a.unshift("Salman");
    document.write(a + "<br><br>");
  </script>
</head>
<body>
</body>
</html>
