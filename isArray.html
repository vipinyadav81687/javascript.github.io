<!DOCTYPE html>
<html>
<head>
  <title>JavaScript</title>
  <script>
    var a = ["Sanjay", "Aman", "Rehman"];
    if(Array.isArray(a)){
        document.write("This is an Array"); 
    }else{
        document.write("This is not an Array");  
    }
  </script>
</head>
